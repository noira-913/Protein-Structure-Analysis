name: Release portable ALMA.exe

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build protein_physics extension (CPU-only runner)
        run: python setup.py build_ext --inplace

      - name: Build portable ALMA.exe
        run: pyinstaller alma.spec --noconfirm --clean

      - name: Package release zip
        run: Compress-Archive -Path dist/ALMA.exe -DestinationPath ALMA-windows-portable.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALMA-windows-portable
          path: ALMA-windows-portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ALMA.exe
            ALMA-windows-portable.zip
          generate_release_notes: true
